# 매일 자정(KST) 어드민 텔레그램에 전날 매출 요약 발송
# 필요 secrets: CRON_SECRET

name: Daily Summary

on:
  schedule:
    # 매일 00:05 KST = 15:05 UTC (전날)
    - cron: "5 15 * * *"
  workflow_dispatch:

concurrency:
  group: daily-summary
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call summary endpoint
        env:
          SITE_URL: https://xn--sns-yg9lh0pw9l.kr
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set +e
          RESP=$(curl -s -X POST "${SITE_URL}/api/cron/daily-summary" \
            -H "X-CRON-SECRET: ${CRON_SECRET}" \
            --max-time 30)
          echo "Response: $RESP"
