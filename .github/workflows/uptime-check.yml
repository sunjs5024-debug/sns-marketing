# 사이트 다운 감지 → 텔레그램 그룹 알림
# 5분마다 사이트 ping, 상태 변화 시(up→down 또는 down→up) 알림 1회만 발송
# 필요한 secrets:
#   TELEGRAM_BOT_TOKEN  — BotFather 에서 받은 봇 토큰 (예: 1234567890:ABC...)
#   TELEGRAM_CHAT_ID    — 알림 받을 그룹 chat_id (예: -1001234567890)

name: Uptime Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: uptime-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read

    steps:
      - name: Restore last state
        uses: actions/cache/restore@v4
        with:
          path: .uptime-state
          key: uptime-state-v1
          restore-keys: |
            uptime-state-

      - name: Check site & send alert
        env:
          SITE_URL: https://xn--sns-yg9lh0pw9l.kr/
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          START=$(date +%s)
          HTTP_CODE=$(curl -s -o /tmp/body.html -w "%{http_code}" --max-time 20 "$SITE_URL")
          END=$(date +%s)
          ELAPSED=$((END - START))

          if [[ "$HTTP_CODE" =~ ^[23][0-9][0-9]$ ]]; then
            CURR_STATE="up"
          else
            CURR_STATE="down"
          fi

          PREV_STATE=$(cat .uptime-state 2>/dev/null || echo "unknown")
          echo "PREV=$PREV_STATE CURR=$CURR_STATE HTTP=$HTTP_CODE ELAPSED=${ELAPSED}s"

          send_alert() {
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=$1"
          }

          NOW=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')

          if [ "$CURR_STATE" = "down" ] && [ "$PREV_STATE" != "down" ]; then
            MSG=$(printf '🔴 <b>SNS소셜팩토리 다운</b>\nURL: %s\nHTTP: %s\n응답시간: %ss\n시간: %s\n\n확인 후 서버를 다시 띄워주세요.' "$SITE_URL" "$HTTP_CODE" "$ELAPSED" "$NOW")
            send_alert "$MSG"
            echo "ALERT sent: down"
          elif [ "$CURR_STATE" = "up" ] && [ "$PREV_STATE" = "down" ]; then
            MSG=$(printf '🟢 <b>SNS소셜팩토리 복구</b>\nURL: %s\nHTTP: %s\n응답시간: %ss\n시간: %s' "$SITE_URL" "$HTTP_CODE" "$ELAPSED" "$NOW")
            send_alert "$MSG"
            echo "ALERT sent: recovered"
          else
            echo "No state change. silent."
          fi

          echo "$CURR_STATE" > .uptime-state

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .uptime-state
          key: uptime-state-v1-${{ github.run_id }}
